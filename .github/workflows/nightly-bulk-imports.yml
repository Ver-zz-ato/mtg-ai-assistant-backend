name: Nightly Bulk Data Import

on:
  # Run every night at 2:00 AM UTC
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable extra debug logging'
        required: false
        default: 'true'
        type: boolean

jobs:
  bulk-import:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Generous timeout to prevent crashes
    # If CRON_KEY (and related secrets) live only under Settings → Environments → * → Environment secrets,
    # uncomment and set the environment name so those secrets are available as ${{ secrets.* }}:
    # environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Repository Actions secrets and Environment secrets are different. This job uses ${{ secrets.CRON_KEY }}.
      # Environment secrets are ONLY injected when `environment:` is set on the job (see note above).
      - name: Validate CRON_KEY is available
        env:
          CRON_KEY: ${{ secrets.CRON_KEY }}
        run: |
          if [ -z "$CRON_KEY" ]; then
            echo "::error::CRON_KEY is empty for this workflow. Either add CRON_KEY under Repo → Settings → Secrets and variables → Actions → Repository secrets, OR add 'environment: <your-env>' to the bulk-import job if CRON_KEY is stored as an Environment secret."
            exit 1
          fi
          echo "OK: CRON_KEY is set (GitHub will mask it; length is ${#CRON_KEY} characters)"
      
      - name: Set up environment
        run: |
          echo "🚀 Starting nightly bulk data import"
          echo "📅 Run date: $(date -u)"
          echo "🔧 GitHub Actions Runner: ubuntu-latest"
          echo "⏰ Timeout: 60 minutes"
      
      - name: Health Check - Ping Vercel Application
        id: health_check
        run: |
          echo "🏥 Checking if Vercel application is reachable..."
          HEALTH_URL="${{ secrets.VERCEL_URL }}/api/health"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Vercel is healthy (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Vercel returned HTTP $HTTP_CODE"
            echo "⚠️ Continuing anyway"
          fi
          
          echo "health_status=$HTTP_CODE" >> $GITHUB_OUTPUT
      
      - name: Wake Up Render Service (FREE tier spindown handling)
        id: render_wakeup
        run: |
          echo "🌅 Waking up Render FREE tier service..."
          echo "💤 Render spins down after 15min inactivity"
          echo "⏰ Cold start takes ~60-90 seconds"
          
          RENDER_HEALTH="https://mtg-bulk-jobs.onrender.com/health"
          
          echo "🔔 Pinging Render health endpoint (2 min timeout)..."
          START=$(date +%s)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$RENDER_HEALTH" || echo "000")
          END=$(date +%s)
          DURATION=$((END - START))
          
          echo "📡 Response: HTTP $HTTP_CODE in ${DURATION}s"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Render is awake!"
            if [ $DURATION -gt 10 ]; then
              echo "⏰ Service was cold, took ${DURATION}s to wake up"
              echo "⏳ Waiting 20 more seconds for full initialization..."
              sleep 20
            else
              echo "🚀 Service was already warm!"
            fi
          else
            echo "❌ Render health check failed (HTTP $HTTP_CODE)"
            echo "⏳ Waiting 60s and retrying..."
            sleep 60
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$RENDER_HEALTH" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Render is awake after retry!"
              echo "⏳ Waiting 20s for full initialization..."
              sleep 20
            else
              echo "❌ Render still not responding, jobs will likely fail"
              exit 1
            fi
          fi
      
      # Job 1 - DISABLED: Run locally due to Render FREE tier 512MB RAM limit
      # Bulk Scryfall import requires ~100MB+ JSON file which exceeds free tier
      # To run manually: cd bulk-jobs-server && npm start, then POST to localhost:3001/bulk-scryfall
      
      # - name: Job 1 - Bulk Scryfall Import (Metadata)
      #   id: job1
      #   continue-on-error: false
      #   run: |
      #     echo "🎨 =========================================="
      #     echo "🎨 JOB 1: Bulk Scryfall Import (Metadata)"
      #     echo "🎨 =========================================="
      #     echo "📋 What: Downloads ALL 110k+ cards with metadata"
      #     echo "💾 Target: scryfall_cache table"
      #     echo "⏱️ Expected: 3-5 minutes"
      #     echo ""
      #     
      #     START_TIME=$(date +%s)
      #     echo "🕐 Start time: $(date -u)"
      #     
      #     API_URL="https://mtg-bulk-jobs.onrender.com/bulk-scryfall"
      #     echo "🌐 Calling: $API_URL"
      #     
      #     # Make the request with detailed output
      #     HTTP_CODE=$(curl -X POST \
      #       -H "x-cron-key: ${{ secrets.CRON_KEY }}" \
      #       -H "Content-Type: application/json" \
      #       -H "User-Agent: GitHub-Actions-Nightly-Import/1.0" \
      #       -w "\n%{http_code}" \
      #       -s \
      #       --max-time 600 \
      #       --connect-timeout 30 \
      #       "$API_URL" \
      #       -o response.json)
      #     
      #     END_TIME=$(date +%s)
      #     DURATION=$((END_TIME - START_TIME))
      #     
      #     echo ""
      #     echo "⏱️ Completed in: ${DURATION} seconds"
      #     echo "📡 HTTP Status: $HTTP_CODE"
      #     echo ""
      #     echo "📄 Response body:"
      #     cat response.json | jq '.' || cat response.json
      #     echo ""
      #     
      #     # Check for success
      #     if [ "$HTTP_CODE" = "200" ]; then
      #       echo "✅ Job 1 completed successfully!"
      #       
      #       # Extract stats if available
      #       INSERTED=$(cat response.json | jq -r '.inserted // "N/A"')
      #       PROCESSED=$(cat response.json | jq -r '.processed // "N/A"')
      #       echo "📊 Stats: Processed=$PROCESSED, Inserted=$INSERTED"
      #     else
      #       echo "❌ Job 1 failed with HTTP $HTTP_CODE"
      #       echo "🔍 Error details:"
      #       cat response.json | jq -r '.error // "No error message"' || echo "Could not parse error"
      #       exit 1
      #     fi
      #     
      #     echo "job1_duration=$DURATION" >> $GITHUB_OUTPUT
      #     echo "job1_status=success" >> $GITHUB_OUTPUT
      
      # Wait removed - Job 1 disabled
      
      - name: Job 2 - Bulk Price Import (Live Prices)
        id: job2
        continue-on-error: false
        run: |
          echo "💰 =========================================="
          echo "💰 JOB 2: Bulk Price Import (Live Prices)"
          echo "💰 =========================================="
          echo "📋 What: Updates prices for ALL cached cards"
          echo "💾 Target: scryfall_cache table (price fields)"
          echo "⏱️ Expected: 3-5 minutes"
          echo ""
          
          START_TIME=$(date +%s)
          echo "🕐 Start time: $(date -u)"
          
          API_URL="https://mtg-bulk-jobs.onrender.com/bulk-price-import"
          echo "🌐 Calling: $API_URL"
          
          HTTP_CODE=$(curl -X POST \
            -H "x-cron-key: ${{ secrets.CRON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Nightly-Import/1.0" \
            -w "%{http_code}" \
            -s \
            --max-time 600 \
            --connect-timeout 30 \
            "$API_URL" \
            -o response.json)
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo ""
          echo "⏱️ Completed in: ${DURATION} seconds"
          echo "📡 HTTP Status: $HTTP_CODE"
          echo ""
          echo "📄 Response body:"
          cat response.json | jq '.' || cat response.json
          echo ""
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Job 2 completed successfully! (HTTP $HTTP_CODE)"
            
            if [ "$HTTP_CODE" = "202" ]; then
              echo "ℹ️ Job accepted and running in background (3-5 minutes)"
            fi
            
            UPDATED=$(cat response.json | jq -r '.updated // "N/A"')
            COVERAGE=$(cat response.json | jq -r '.coverage // "N/A"')
            echo "📊 Stats: Updated=$UPDATED, Coverage=$COVERAGE"
          else
            echo "❌ Job 2 failed with HTTP $HTTP_CODE"
            echo "🔍 Error details:"
            cat response.json | jq -r '.error // "No error message"' || echo "Could not parse error"
            exit 1
          fi
          
          echo "job2_duration=$DURATION" >> $GITHUB_OUTPUT
          echo "job2_status=success" >> $GITHUB_OUTPUT
      
      - name: Verify Job 2 Completion
        id: verify_job2
        continue-on-error: true
        run: |
          echo ""
          echo "🔍 =========================================="
          echo "🔍 VERIFYING JOB 2 COMPLETION"
          echo "🔍 =========================================="
          echo ""
          
          # Query Supabase to check if job completed
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SUPABASE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          
          # Validate secrets are set
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "❌ Missing Supabase secrets (SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY)"
            echo "verify_job2_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Sanitize SUPABASE_URL to remove hidden control characters and trailing slashes
          SUPABASE_URL_CLEAN=$(printf %s "$SUPABASE_URL" | tr -d '\r\n ' | sed -E 's#/*$##')
          
          echo "🔍 Querying Supabase..."
          echo "🔍 Original URL length: ${#SUPABASE_URL} characters"
          echo "🔍 Cleaned URL length: ${#SUPABASE_URL_CLEAN} characters"
          echo "🔍 URL prefix: ${SUPABASE_URL_CLEAN%%/*}..." # Show domain only for security
          echo "🔍 Key length: ${#SUPABASE_KEY} characters"
          echo ""
          
          # Check for timestamp within last 30 minutes (more forgiving, accounts for job duration)
          CURRENT_EPOCH=$(date -u +%s)
          CUTOFF_EPOCH=$((CURRENT_EPOCH - 1800))  # 30 minutes ago
          
          echo "⏰ Current time: $(date -u -d "@$CURRENT_EPOCH" +"%Y-%m-%dT%H:%M:%S" 2>/dev/null || date -u)"
          echo "⏰ Checking for timestamp after: $(date -u -d "@$CUTOFF_EPOCH" +"%Y-%m-%dT%H:%M:%S" 2>/dev/null || date -u)"
          echo "   (looking for timestamps within last 30 minutes)"
          echo ""
          
          # Poll for up to 12 minutes (24 attempts, every 30 seconds)
          MAX_ATTEMPTS=24
          ATTEMPT=1
          FOUND=false
          
          echo "⏳ Polling database every 30s for job completion (max ${MAX_ATTEMPTS} attempts = 12 minutes)..."
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo ""
            echo "🔍 Attempt $ATTEMPT/$MAX_ATTEMPTS: $(date -u)"
            
            # Query Supabase for last run timestamp
            RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              --max-time 15 \
              --connect-timeout 10 \
              --retry 2 \
              --retry-delay 2 \
              "$SUPABASE_URL_CLEAN/rest/v1/app_config?key=eq.job:last:bulk_price_import&select=value" 2>&1)
            
            CURL_EXIT=$?
            HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2 || echo "000")
            RESPONSE_BODY=$(echo "$RESPONSE" | grep -v "HTTP_CODE:" | grep -v "^[<>]" | grep -v "^[{}]" | grep -v "^[*]" | tail -1)
            
            if [ "$CURL_EXIT" != "0" ] || [ "$HTTP_CODE" != "200" ]; then
              echo "⚠️ Query failed (HTTP $HTTP_CODE, curl exit $CURL_EXIT) - retrying in 30s..."
              sleep 30
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi
            
            LAST_RUN=$(echo "$RESPONSE_BODY" | jq -r '.[0].value // empty' 2>/dev/null || echo "")
            
            if [ -z "$LAST_RUN" ] || [ "$LAST_RUN" = "null" ]; then
              echo "⚠️ No timestamp found yet - retrying in 30s..."
              sleep 30
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi
            
            # Parse timestamp to epoch
            LAST_RUN_CLEANED=$(echo "$LAST_RUN" | sed 's/\.[0-9]*//' | sed 's/Z$//')
            LAST_RUN_EPOCH=$(date -u -d "$LAST_RUN_CLEANED" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%S" "$LAST_RUN_CLEANED" +%s 2>/dev/null || echo "0")
            
            echo "📅 Last run timestamp: $LAST_RUN"
            echo "🔢 Timestamp epoch: $LAST_RUN_EPOCH"
            echo "🔢 Cutoff epoch: $CUTOFF_EPOCH"
            
            if [ "$LAST_RUN_EPOCH" != "0" ] && [ $LAST_RUN_EPOCH -gt $CUTOFF_EPOCH ]; then
              echo ""
              echo "✅ Job 2 verified - timestamp updated successfully!"
              echo "📅 Timestamp: $LAST_RUN (was updated after job start)"
              echo "verify_job2_status=success" >> $GITHUB_OUTPUT
              FOUND=true
              break
            else
              echo "⏳ Timestamp not recent enough yet (or parsing failed) - retrying in 30s..."
              sleep 30
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done
          
          if [ "$FOUND" = "false" ]; then
            echo ""
            echo "⚠️ Job 2 verification inconclusive - timestamp not updated within 12 minutes"
            echo "⚠️ This could mean the job is still running, failed silently, or took longer than expected"
            echo "⚠️ Continuing workflow anyway..."
            echo "verify_job2_status=inconclusive" >> $GITHUB_OUTPUT
            exit 0  # Don't fail the workflow, just mark as inconclusive
          fi
      
      - name: Wait between jobs (5 seconds)
        run: |
          echo "⏸️ Waiting 5 seconds before next job..."
          sleep 5
      
      - name: Job 3 - Historical Price Snapshots
        id: job3
        continue-on-error: false
        run: |
          echo "📈 =========================================="
          echo "📈 JOB 3: Historical Price Snapshots"
          echo "📈 =========================================="
          echo "📋 What: Creates historical price snapshots"
          echo "💾 Target: price_snapshots table"
          echo "⏱️ Expected: 2-3 minutes"
          echo ""
          
          START_TIME=$(date +%s)
          echo "🕐 Start time: $(date -u)"
          
          API_URL="https://mtg-bulk-jobs.onrender.com/price-snapshot"
          echo "🌐 Calling: $API_URL"
          
          HTTP_CODE=$(curl -X POST \
            -H "x-cron-key: ${{ secrets.CRON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Nightly-Import/1.0" \
            -w "%{http_code}" \
            -s \
            --max-time 600 \
            --connect-timeout 30 \
            "$API_URL" \
            -o response.json)
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo ""
          echo "⏱️ Completed in: ${DURATION} seconds"
          echo "📡 HTTP Status: $HTTP_CODE"
          echo ""
          echo "📄 Response body:"
          cat response.json | jq '.' || cat response.json
          echo ""
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Job 3 completed successfully! (HTTP $HTTP_CODE)"
            
            if [ "$HTTP_CODE" = "202" ]; then
              echo "ℹ️ Job accepted and running in background (2-3 minutes)"
            fi
            
            INSERTED=$(cat response.json | jq -r '.inserted // "N/A"')
            SNAPSHOT_DATE=$(cat response.json | jq -r '.snapshot_date // "N/A"')
            echo "📊 Stats: Inserted=$INSERTED, Date=$SNAPSHOT_DATE"
          else
            echo "❌ Job 3 failed with HTTP $HTTP_CODE"
            echo "🔍 Error details:"
            cat response.json | jq -r '.error // "No error message"' || echo "Could not parse error"
            exit 1
          fi
          
          echo "job3_duration=$DURATION" >> $GITHUB_OUTPUT
          echo "job3_status=success" >> $GITHUB_OUTPUT
      
      - name: Verify Job 3 Completion
        id: verify_job3
        continue-on-error: true
        run: |
          echo ""
          echo "🔍 =========================================="
          echo "🔍 VERIFYING JOB 3 COMPLETION"
          echo "🔍 =========================================="
          echo ""
          
          # Query Supabase to check if job completed
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SUPABASE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          
          # Validate secrets are set
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "❌ Missing Supabase secrets (SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY)"
            echo "verify_job3_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Sanitize SUPABASE_URL to remove hidden control characters and trailing slashes
          SUPABASE_URL_CLEAN=$(printf %s "$SUPABASE_URL" | tr -d '\r\n ' | sed -E 's#/*$##')
          
          echo "🔍 Querying Supabase..."
          echo "🔍 Original URL length: ${#SUPABASE_URL} characters"
          echo "🔍 Cleaned URL length: ${#SUPABASE_URL_CLEAN} characters"
          echo "🔍 URL prefix: ${SUPABASE_URL_CLEAN%%/*}..." # Show domain only for security
          echo "🔍 Key length: ${#SUPABASE_KEY} characters"
          echo ""
          
          # Check for timestamp within last 30 minutes (more forgiving, accounts for job duration)
          CURRENT_EPOCH=$(date -u +%s)
          CUTOFF_EPOCH=$((CURRENT_EPOCH - 1800))  # 30 minutes ago
          
          echo "⏰ Current time: $(date -u -d "@$CURRENT_EPOCH" +"%Y-%m-%dT%H:%M:%S" 2>/dev/null || date -u)"
          echo "⏰ Checking for timestamp after: $(date -u -d "@$CUTOFF_EPOCH" +"%Y-%m-%dT%H:%M:%S" 2>/dev/null || date -u)"
          echo "   (looking for timestamps within last 30 minutes)"
          echo ""
          
          # Poll for up to 10 minutes (20 attempts, every 30 seconds)
          MAX_ATTEMPTS=20
          ATTEMPT=1
          FOUND=false
          
          echo "⏳ Polling database every 30s for job completion (max ${MAX_ATTEMPTS} attempts = 10 minutes)..."
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo ""
            echo "🔍 Attempt $ATTEMPT/$MAX_ATTEMPTS: $(date -u)"
            
            # Query Supabase for last run timestamp
            RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              --max-time 15 \
              --connect-timeout 10 \
              --retry 2 \
              --retry-delay 2 \
              "$SUPABASE_URL_CLEAN/rest/v1/app_config?key=eq.job:last:price_snapshot_bulk&select=value" 2>&1)
            
            CURL_EXIT=$?
            HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2 || echo "000")
            RESPONSE_BODY=$(echo "$RESPONSE" | grep -v "HTTP_CODE:" | grep -v "^[<>]" | grep -v "^[{}]" | grep -v "^[*]" | tail -1)
            
            if [ "$CURL_EXIT" != "0" ] || [ "$HTTP_CODE" != "200" ]; then
              echo "⚠️ Query failed (HTTP $HTTP_CODE, curl exit $CURL_EXIT) - retrying in 30s..."
              sleep 30
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi
            
            LAST_RUN=$(echo "$RESPONSE_BODY" | jq -r '.[0].value // empty' 2>/dev/null || echo "")
            
            if [ -z "$LAST_RUN" ] || [ "$LAST_RUN" = "null" ]; then
              echo "⚠️ No timestamp found yet - retrying in 30s..."
              sleep 30
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi
            
            # Parse timestamp to epoch
            LAST_RUN_CLEANED=$(echo "$LAST_RUN" | sed 's/\.[0-9]*//' | sed 's/Z$//')
            LAST_RUN_EPOCH=$(date -u -d "$LAST_RUN_CLEANED" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%S" "$LAST_RUN_CLEANED" +%s 2>/dev/null || echo "0")
            
            echo "📅 Last run timestamp: $LAST_RUN"
            echo "🔢 Timestamp epoch: $LAST_RUN_EPOCH"
            echo "🔢 Cutoff epoch: $CUTOFF_EPOCH"
            
            if [ "$LAST_RUN_EPOCH" != "0" ] && [ $LAST_RUN_EPOCH -gt $CUTOFF_EPOCH ]; then
              echo ""
              echo "✅ Job 3 verified - timestamp updated successfully!"
              echo "📅 Timestamp: $LAST_RUN (was updated after job start)"
              echo "verify_job3_status=success" >> $GITHUB_OUTPUT
              FOUND=true
              break
            else
              echo "⏳ Timestamp not recent enough yet (or parsing failed) - retrying in 30s..."
              sleep 30
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done
          
          if [ "$FOUND" = "false" ]; then
            echo ""
            echo "⚠️ Job 3 verification inconclusive - timestamp not updated within 10 minutes"
            echo "⚠️ This could mean the job is still running, failed silently, or took longer than expected"
            echo "⚠️ Continuing workflow anyway..."
            echo "verify_job3_status=inconclusive" >> $GITHUB_OUTPUT
            exit 0  # Don't fail the workflow, just mark as inconclusive
          fi
      
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ MTG AI Assistant - Nightly Jobs FAILED"
          to: ${{ secrets.ADMIN_EMAIL }}
          from: "MTG AI Assistant <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            🚨 NIGHTLY BULK DATA IMPORT FAILED 🚨
            
            Run Date: ${{ github.event.repository.updated_at }}
            Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Job Results:
            - Job 2 (Price Import): ${{ steps.job2.outputs.job2_status || 'FAILED' }}
            - Job 2 Verification: ${{ steps.verify_job2.outputs.verify_job2_status || 'FAILED' }}
            - Job 3 (Price Snapshots): ${{ steps.job3.outputs.job3_status || 'FAILED' }}
            - Job 3 Verification: ${{ steps.verify_job3.outputs.verify_job3_status || 'FAILED' }}
            
            Please check the logs at the workflow link above.
            
            --- 
            Automated message from GitHub Actions
      
      - name: Summary
        if: always()
        run: |
          echo ""
          echo "🎉 =========================================="
          echo "🎉 NIGHTLY IMPORT SUMMARY"
          echo "🎉 =========================================="
          echo ""
          echo "📅 Run completed: $(date -u)"
          echo ""
          echo "Job Results:"
          echo "  🎨 Job 1 (Metadata):  ${{ steps.job1.outputs.job1_status || 'DISABLED' }} - ${{ steps.job1.outputs.job1_duration || 'N/A' }}s"
          echo "  💰 Job 2 (Prices):    ${{ steps.job2.outputs.job2_status || 'FAILED' }} - ${{ steps.job2.outputs.job2_duration || 'N/A' }}s"
          echo "  🔍 Job 2 Verification: ${{ steps.verify_job2.outputs.verify_job2_status || 'FAILED' }}"
          echo "  📈 Job 3 (Snapshots): ${{ steps.job3.outputs.job3_status || 'FAILED' }} - ${{ steps.job3.outputs.job3_duration || 'N/A' }}s"
          echo "  🔍 Job 3 Verification: ${{ steps.verify_job3.outputs.verify_job3_status || 'FAILED' }}"
          echo ""
          
          TOTAL_TIME=$((
            ${{ steps.job1.outputs.job1_duration || 0 }} +
            ${{ steps.job2.outputs.job2_duration || 0 }} +
            ${{ steps.job3.outputs.job3_duration || 0 }}
          ))
          echo "⏱️ Total runtime: ${TOTAL_TIME} seconds (~$((TOTAL_TIME / 60)) minutes)"
          echo ""
          
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ All jobs completed successfully!"
          else
            echo "❌ Some jobs failed - check logs above"
          fi
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
