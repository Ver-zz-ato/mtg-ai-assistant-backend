services:
  - type: web
    name: mtg-ai-assistant-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: CRON_KEY
        sync: false
      - key: LEGACY_DEBUG_TOKEN
        sync: false
      - key: LEGACY_API_TOKEN
        sync: false
      - key: REQUIRE_LEGACY_API_AUTH
        value: "1"
    pythonVersion: 3.10.13
